name: Deploy Lambda

on:
  push:
    branches:
      - develop
      - staging
      - main
  workflow_dispatch: # Permite también el disparo manual que mencionas en tus comentarios

permissions:
  id-token: write   # Necesario para OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # 1. Job para mapear la rama al entorno de GitHub
  # -------------------------------------------------------------------------
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.map.outputs.env_name }}
    steps:
      - name: Map branch to environment
        id: map
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "staging" ]; then
            echo "env_name=staging" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "env_name=development" >> $GITHUB_OUTPUT
          else
            echo "Ref no Reconocido: $GITHUB_REF_NAME"
            exit 1
          fi

  # -------------------------------------------------------------------------
  # 2. Job de Despliegue (Bloquea el ambiente, carga secrets y pide aprobación)
  # -------------------------------------------------------------------------
  deploy:
    needs: set-environment
    runs-on: ubuntu-latest
    
    # Esto activa los revisores obligatorios de prod y carga los vars/secrets correctos
    environment: ${{ needs.set-environment.outputs.env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar AWS SAM CLI
        run: |
          pip install --upgrade "aws-sam-cli>=1.131"
          sam --version

      - name: Autenticación AWS vía OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }} # Se cargará el del ambiente correcto
          aws-region: ${{ vars.AWS_REGION }}                 # Se cargará el del ambiente correcto
          role-session-name: gha-deploy-session

      - name: SAM build
        run: sam build --use-container

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "${{ vars.STACK_NAME }}-${{ needs.set-environment.outputs.env_name }}" \
            --s3-bucket "${{ vars.ARTIFACT_BUCKET }}-${{ needs.set-environment.outputs.env_name }}" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=${{ needs.set-environment.outputs.env_name }}" \
              "RedisHostParam=${{ needs.set-environment.outputs.env_name }}-redis-host" \
              "DbHostParam=${{ needs.set-environment.outputs.env_name }}-db-host"