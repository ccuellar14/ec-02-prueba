name: Deploy Lambda

# ---------------------------------------------------------------------------
# Despliegue de Lambdas a 3 ambientes (dev, staging, prod) con AWS SAM.
#
# Estrategia de disparo:
#   - push a 'develop'  -> dev      (automático)
#   - push a 'main'     -> staging  (automático)
#   - prod              -> manual (workflow_dispatch) + aprobación obligatoria
#                          vía GitHub Environment 'prod' (required reviewers)
#
# Autenticación: OIDC (sin access keys). Cada ambiente asume su propio rol IAM.
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - develop
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente destino"
        required: true
        type: choice
        options:
          - development
          - staging
          - production

# Permisos mínimos para OIDC
permissions:
  id-token: write   # necesario para solicitar el token OIDC a AWS
  contents: read

# Evita despliegues concurrentes al mismo ambiente
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # -------------------------------------------------------------------------
  # 1. Build + deploy
  # -------------------------------------------------------------------------
  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    # El Environment aplica las protecciones (required reviewers en prod)
    # y expone sus variables/secrets propios.
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - name: Map branch to environment
        id: envmap
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "staging" ]; then
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "ENVIRONMENT=development" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=unknown" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar AWS SAM CLI
        run: |
          pip install --upgrade "aws-sam-cli>=1.131"
          sam --version

      - name: Autenticación AWS vía OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-deploy-$ENVIRONMENT

      - name: SAM build
        run: sam build --use-container

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "${{ vars.STACK_NAME }}-"$ENVIRONMENT \
            --s3-bucket "${{ vars.ARTIFACT_BUCKET }}" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=${{ ENVIRONMENT }}" \
              "RedisHostParam=${{ vars.REDIS_HOST_SSM_PATH }}" \
              "DbHostParam=${{ vars.DB_HOST_SSM_PATH }}"