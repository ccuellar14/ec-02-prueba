AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  prueba — generada automáticamente y corregida para multi-ambiente.

# ---------------------------------------------------------------------------
# Parámetros inyectados por el pipeline o samconfig.toml
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    AllowedValues: [development, staging, production] # Corregido: Coincide con GitHub Actions
    Description: Ambiente destino. Se usa también como nombre de alias.
 
  RedisHostParam:
    Type: String
    Description: Ruta SSM o Host de Redis para este ambiente. (Inyectado externamente)
 
  DbHostParam:
    Type: String
    Description: Ruta SSM o Host de Base de Datos para este ambiente. (Inyectado externamente)

# ---------------------------------------------------------------------------
# Config de despliegue gradual por ambiente
# ---------------------------------------------------------------------------
Mappings:
  DeployConfig:
    development: # Corregido para coincidir con el parámetro
      Type: AllAtOnce
    staging:
      Type: AllAtOnce
    production: # Corregido para coincidir con el parámetro
      Type: Canary10Percent5Minutes

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: python3.13
    Architectures:
      - x86_64

Resources:
  pruebaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "prueba-${Environment}" # Hecho dinámico: prueba-development, prueba-production, etc.
      CodeUri: ./
      Handler: lambda_function.lambda_handler
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          REDIS_HOST: !Ref RedisHostParam
          DB_HOST: !Ref DbHostParam
      
      # --- Clave del rollback optimizado ---
      AutoPublishAlias: !Ref Environment # Crea/actualiza el alias dinámicamente
      DeploymentPreference:
        Type: !FindInMap [DeployConfig, !Ref Environment, Type]
        Alarms:
          - !Ref ErrorsAlarm

  # Alarma sobre errores de la función (versión nueva durante el shift de tráfico)
  ErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Errores en función prueba para el ambiente ${Environment}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref pruebaFunction
        - Name: Resource
          Value: !Sub "${pruebaFunction}:${Environment}" # Hecho dinámico para escuchar el alias correcto
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
 
Outputs:
  FunctionArn:
    Value: !GetAtt pruebaFunction.Arn
  AliasArn:
    Value: !Ref pruebaFunction.Alias