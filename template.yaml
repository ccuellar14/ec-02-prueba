AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  prueba — generada automáticamente.

# ---------------------------------------------------------------------------
# Parámetros inyectados por el pipeline (workflow deploy.yml)
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Ambiente destino. Se usa también como nombre de alias.
 
  RedisHostParam:
    Type: String
    Value: !Sub  "${Environment}-redis-host"  # Ejemplo: "dev-redis-host"
    Description: Ruta SSM que contiene redis_host para este ambiente.
 
  DbHostParam:
    Type: String
    Value: !Sub  "${Environment}-db-host"  # Ejemplo: "dev-db-host"
    Description: Ruta SSM que contiene db_host para este ambiente.

# ---------------------------------------------------------------------------
# Config de despliegue gradual por ambiente:
#   - dev/staging: AllAtOnce (rápido, bajo riesgo)
#   - prod:        Canary 10% por 5 min (detecta fallas antes del 100%)
# ---------------------------------------------------------------------------
Mappings:
  DeployConfig:
    dev:
      Type: AllAtOnce
    staging:
      Type: AllAtOnce
    prod:
      Type: Canary10Percent5Minutes

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: python3.13
    Architectures:
      - x86_64

Resources:
  pruebaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prueba-dev
      CodeUri: ./
      Handler: lambda_function.lambda_handler
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          REDIS_HOST: !Ref RedisHostParam
          DB_HOST: !Ref DbHostParam
      # --- Clave del rollback optimizado ---
      AutoPublishAlias: !Ref Environment      # crea/actualiza alias = nombre del ambiente
      DeploymentPreference:
        Type: !FindInMap [DeployConfig, !Ref Environment, Type]
        Alarms:
          # Si estas alarmas se disparan durante el shift de tráfico,
          # CodeDeploy revierte automáticamente al alias anterior.
          - !Ref ErrorsAlarm
    # Alarma sobre errores de la función (versión nueva durante el shift)
  ErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Errores en prueba-dev"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref pruebaFunction
        - Name: Resource
          Value: !Sub "pruebaFunction:dev"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
 
Outputs:
  FunctionArn:
    Value: !GetAtt pruebaFunction.Arn
  AliasArn:
    Value: !Ref pruebaFunction.Alias
